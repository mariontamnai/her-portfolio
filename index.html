<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <!-- Link to Tailwind CSS for styling -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50 text-gray-900">
    <!-- Header with Navigation -->
    <header class="bg-blue-600 p-6 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-white text-3xl font-semibold">My Portfolio</h1>
            <nav>
                <ul class="flex space-x-6 text-white font-medium">
                    <li><a href="#about" class="hover:text-blue-300">About</a></li>
                    <li><a href="#projects" class="hover:text-blue-300">Projects</a></li>
                    <li><a href="#contact" class="hover:text-blue-300">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content Section -->
    <main>
        <section id="about" class="py-20 bg-gray-100">
            <div class="container mx-auto px-6 text-center">
                <h2 class="text-4xl font-semibold mb-4">About Me</h2>
                <p class="text-lg">I’m a passionate developer with a love for creating interactive web applications.</p>
            </div>
        </section>

        <section id="projects" class="py-20">
            <div class="container mx-auto px-6 text-center">
                <h2 class="text-4xl font-semibold mb-8">My Projects</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                    <!-- Insert Project Cards Here -->
                </div>
            </div>
        </section>

        <section id="contact" class="py-20 bg-gray-100">
            <div class="container mx-auto px-6 text-center">
                <h2 class="text-4xl font-semibold mb-4">Contact Me</h2>
                <p class="text-lg mb-4">Feel free to reach out for collaborations or inquiries!</p>
                <form id="contact-form" class="max-w-lg mx-auto space-y-4">
                    <input type="text" name="name" placeholder="Your Name"
                        class="w-full px-4 py-2 rounded border border-gray-300" required>
                    <input type="email" name="email" placeholder="Your Email"
                        class="w-full px-4 py-2 rounded border border-gray-300" required>
                    <textarea name="message" placeholder="Your Message"
                        class="w-full px-4 py-2 rounded border border-gray-300" required></textarea>
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <!-- Footer Section -->
    <footer class="bg-blue-600 text-white py-6 text-center">
        <p>© 2024 Your Name. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
